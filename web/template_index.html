<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1d23">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="manifest" href="./manifest.webmanifest">
<title>타이밍 wATH — 데일리 신호</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; background: #111318; color: #e0e2e6; padding: 16px; padding-bottom: 48px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
h1 { font-size: 18px; font-weight: 700; text-align: center; padding: 20px 0 8px; letter-spacing: -0.3px; color: #e8eaed; }
.subtitle { text-align: center; font-size: 12px; color: #9aa0a6; margin-bottom: 20px; }
.card { background: #1a1d23; border-radius: 14px; padding: 18px; margin-bottom: 14px; border: 1px solid #2c2f36; }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #9aa0a6; margin-bottom: 6px; }
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 18px; border-radius: 100px; font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
.badge.on { background: #0d652d; color: #c6f0d6; }
.badge.off { background: #3c4043; color: #9aa0a6; }
.badge.neutral { background: #5c3b00; color: #fde293; }
.signal-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.signal-meta { font-size: 13px; color: #9aa0a6; }
.px-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
.px-item { background: #22252b; border-radius: 10px; padding: 12px; text-align: center; }
.px-ticker { font-size: 12px; color: #9aa0a6; font-weight: 600; }
.px-value { font-size: 20px; font-weight: 700; color: #e8eaed; margin-top: 2px; }
.target-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; }
.target-card { flex: 1; background: #22252b; border-radius: 10px; padding: 14px; text-align: center; }
.target-pct { font-size: 28px; font-weight: 800; color: #e8eaed; }
.target-ticker { font-size: 13px; color: #9aa0a6; margin-top: 2px; }
.target-note { font-size: 11px; color: #f28b82; margin-top: 4px; }
.ratio-bar { display: flex; align-items: center; gap: 4px; margin-top: 8px; height: 6px; position: relative; }
.ratio-track { flex: 1; height: 6px; background: #2c2f36; border-radius: 3px; position: relative; overflow: visible; }
.ratio-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.ratio-marker { position: absolute; top: -8px; width: 2px; height: 22px; background: #e8eaed; border-radius: 1px; }
.ratio-marker.upper { background: #5f9b5f; }
.ratio-marker.lower { background: #9b5f5f; }
.ratio-label { font-size: 11px; color: #9aa0a6; }
.conclusion { font-size: 13px; color: #c4c7cc; padding: 8px 0 4px; line-height: 1.6; }
.meta-line { display: flex; justify-content: center; gap: 16px; font-size: 12px; color: #9aa0a6; margin-top: 4px; }
.footer { text-align: center; font-size: 11px; color: #5f6368; margin-top: 28px; line-height: 1.6; }
.footer a { color: #8ab4f8; text-decoration: none; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status-dot.open { background: #34a853; }
.status-dot.closed { background: #ea4335; }
.loading { text-align: center; padding: 40px 0; color: #9aa0a6; font-size: 14px; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-primary, .btn-secondary { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; -webkit-tap-highlight-color: transparent; text-decoration: none; }
.btn-primary { background: #303134; color: #e8eaed; }
.btn-primary:active { background: #404348; }
.btn-primary:disabled { opacity: 0.5; }
.btn-secondary { background: transparent; color: #8ab4f8; border: 1px solid #3c4043; }
.btn-secondary:active { background: #1a1d23; }
.toast { font-size: 12px; color: #f28b82; text-align: center; padding: 6px 0 0; }
.check-time { font-size: 11px; color: #5f6368; text-align: center; margin-top: 4px; }
.chart-wrap { margin-top: 12px; width: 100%; }
.chart-wrap canvas { display: block; width: 100%; height: 200px; border-radius: 8px; }
</style>
</head>
<body>
<h1>타이밍 wATH</h1>
<div class="subtitle">SOXL60 + QLD40 — 데일리 추세 신호</div>

<div id="app" class="loading">데이터 불러오는 중...</div>
<div id="toast" class="toast" style="display:none"></div>
<div id="checkTime" class="check-time" style="display:none"></div>

<script>
(function() {
  const app = document.getElementById("app");
  const toast = document.getElementById("toast");
  const checkTime = document.getElementById("checkTime");
  let cachedData = null;
  let cachedSeries = null;

  async function loadData() {
    try {
      const res = await fetch("./data/latest.json?_=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const d = await res.json();
      cachedData = d;
      render(d);
      const now = new Date();
      checkTime.textContent = "마지막 확인: " + now.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      checkTime.style.display = "block";
      toast.style.display = "none";
      return d;
    } catch(e) {
      if (cachedData) {
        toast.textContent = "⚠️ 오프라인 — 캐시된 데이터 표시 중";
        toast.style.display = "block";
        return cachedData;
      }
      app.innerHTML = '<div class="card" style="text-align:center;padding:32px;color:#f28b82;">⚠️ 데이터를 불러올 수 없습니다<br><span style="font-size:12px;color:#9aa0a6">' + e.message + '</span></div>';
    }
  }

  async function loadSeries() {
    try {
      const res = await fetch("./data/series.json?_=" + Date.now(), { cache: "no-store" });
      if (!res.ok) return;
      const s = await res.json();
      cachedSeries = s;
      const canvas = document.getElementById("chart");
      if (canvas) drawChart(canvas, s);
    } catch(_) {}
  }

  function drawChart(canvas, series) {
    const pts = series.points;
    if (!pts || pts.length < 2) return;
    const buf = series.buffer || 0.03;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width;
    const h = 200;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    const pad = { top: 14, right: 10, bottom: 28, left: 48 };
    const pw = w - pad.left - pad.right;
    const ph = h - pad.top - pad.bottom;

    const hasMA = pts.some(function(p) { return p.ma !== null; });

    var yMin = Infinity, yMax = -Infinity;
    for (var i = 0; i < pts.length; i++) {
      var v = pts[i].soxx;
      if (v < yMin) yMin = v;
      if (v > yMax) yMax = v;
      if (hasMA && pts[i].ma !== null) {
        var mv = pts[i].ma;
        if (mv < yMin) yMin = mv;
        if (mv > yMax) yMax = mv;
      }
    }
    if (hasMA) {
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var uv = pts[i].ma * (1 + buf);
        var lv = pts[i].ma * (1 - buf);
        if (uv > yMax) yMax = uv;
        if (lv < yMin) yMin = lv;
      }
    }
    var range = yMax - yMin || 1;
    var margin = range * 0.05;
    yMin -= margin;
    yMax += margin;

    function yPos(v) { return pad.top + ph - (v - yMin) / (yMax - yMin) * ph; }
    function xPos(i) { return pad.left + i / (pts.length - 1) * pw; }

    ctx.clearRect(0, 0, w, h);

    // band fill
    if (hasMA) {
      ctx.beginPath();
      var started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i);
        if (!started) { ctx.moveTo(x, yPos(pts[i].ma * (1 + buf))); started = true; }
        else ctx.lineTo(x, yPos(pts[i].ma * (1 + buf)));
      }
      for (var i = pts.length - 1; i >= 0; i--) {
        if (pts[i].ma === null) continue;
        ctx.lineTo(xPos(i), yPos(pts[i].ma * (1 - buf)));
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(249,171,0,0.10)";
      ctx.fill();

      // band edge lines (dashed)
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1;
      ctx.beginPath();
      started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i), y = yPos(pts[i].ma * (1 + buf));
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(249,171,0,0.35)";
      ctx.stroke();
      ctx.beginPath();
      started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i), y = yPos(pts[i].ma * (1 - buf));
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(249,171,0,0.35)";
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // MA line
    if (hasMA) {
      ctx.beginPath();
      started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i), y = yPos(pts[i].ma);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "#f9ab00";
      ctx.stroke();
    }

    // SOXX price line
    ctx.beginPath();
    for (var i = 0; i < pts.length; i++) {
      var x = xPos(i), y = yPos(pts[i].soxx);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#8ab4f8";
    ctx.stroke();

    // highlight last point
    var last = pts[pts.length - 1];
    var lx = xPos(pts.length - 1), ly = yPos(last.soxx);
    ctx.beginPath();
    ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#8ab4f8";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(lx, ly, 2, 0, Math.PI * 2);
    ctx.fillStyle = "#111318";
    ctx.fill();

    // last MA point
    if (hasMA && last.ma !== null) {
      var lmy = yPos(last.ma);
      ctx.beginPath();
      ctx.arc(lx, lmy, 3, 0, Math.PI * 2);
      ctx.fillStyle = "#f9ab00";
      ctx.fill();
    }

    // Y axis ticks
    var yTicks = 4;
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.font = "10px sans-serif";
    ctx.fillStyle = "#5f6368";
    for (var i = 0; i <= yTicks; i++) {
      var v = yMin + (yMax - yMin) * i / yTicks;
      var y = yPos(v);
      ctx.fillText("$" + v.toFixed(0), pad.left - 6, y);
      ctx.beginPath();
      ctx.moveTo(pad.left - 4, y);
      ctx.lineTo(pad.left, y);
      ctx.strokeStyle = "#2c2f36";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // X axis date labels
    var xLabels = 4;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    for (var i = 0; i < xLabels; i++) {
      var idx = Math.floor(i * (pts.length - 1) / (xLabels - 1));
      ctx.fillText(pts[idx].d.slice(2), pad.left + idx / (pts.length - 1) * pw, pad.top + ph + 6);
    }

    // legend
    ctx.textBaseline = "top";
    ctx.font = "10px sans-serif";
    var legX = pad.left + 6, legY = pad.top + 4;
    var items = [
      { label: "SOXX", color: "#8ab4f8" },
      { label: "120MA", color: "#f9ab00" },
      { label: "\u00B1" + (buf * 100).toFixed(0) + "%", color: "rgba(249,171,0,0.35)" },
    ];
    for (var i = 0; i < items.length; i++) {
      ctx.fillStyle = items[i].color;
      ctx.fillRect(legX, legY + 1, 10, 2);
      ctx.fillStyle = "#9aa0a6";
      ctx.fillText(items[i].label, legX + 14, legY - 1);
      legX += ctx.measureText(items[i].label).width + 28;
    }

    // ratio label at last point
    if (hasMA && last.ma !== null) {
      ctx.textAlign = "left";
      ctx.textBaseline = "bottom";
      ctx.font = "bold 11px sans-serif";
      ctx.fillStyle = "#e8eaed";
      ctx.fillText((last.soxx / last.ma).toFixed(3) + "x", lx + 7, ly - 2);
    }
  }

  function render(d) {
    const signal = d.signal, market = d.market, prices = d.prices;
    const target = d.target, conclusion = d.conclusion;

    const stateLabel = { ON: "매수", OFF: "현금", NEUTRAL: "관망" };
    const badgeCls = { ON: "on", OFF: "off", NEUTRAL: "neutral" };
    const s = signal.state;

    const ratioPct = ((signal.ratio - 0.95) / 0.10 * 100);
    const ratioClamped = Math.max(0, Math.min(100, ratioPct));

    const updated = new Date(d.updated_at);
    const timeStr = updated.toLocaleString("ko-KR", { timeZone: "Asia/Seoul", hour: "2-digit", minute: "2-digit", month: "2-digit", day: "2-digit" });

    app.innerHTML = ''
      + '<div class="card">'
      + '  <div class="card-label">오늘의 신호</div>'
      + '  <div class="badge ' + badgeCls[s] + '">' + stateLabel[s] + '</div>'
      + '  <div class="signal-row">'
      + '    <span class="signal-meta">SOXX/120MA = ' + signal.ratio.toFixed(3) + '</span>'
      + '    <span class="signal-meta">밴드 \u00B1' + ((signal.upper - 1) * 100).toFixed(0) + '%</span>'
      + '  </div>'
      + '  <div class="ratio-bar">'
      + '    <span class="ratio-label">0.95</span>'
      + '    <div class="ratio-track">'
      + '      <div class="ratio-fill" style="width:' + ratioClamped + '%;background:' + (s === "ON" ? "#34a853" : s === "OFF" ? "#ea4335" : "#f9ab00") + '"></div>'
      + '      <div class="ratio-marker upper" style="left:' + ((signal.upper - 0.95) / 0.10 * 100) + '%"></div>'
      + '      <div class="ratio-marker lower" style="left:' + ((signal.lower - 0.95) / 0.10 * 100) + '%"></div>'
      + '    </div>'
      + '    <span class="ratio-label">1.05</span>'
      + '  </div>'
      + '  <div class="chart-wrap"><canvas id="chart" height="200"></canvas></div>'
      + '  <div class="btn-row">'
      + '    <button class="btn-primary" onclick="window.__refresh()">\uD83D\uDD04 새로고침</button>'
      + '    <a class="btn-secondary" href="https://github.com/wilocraw-alt/qld-timing-backtest/actions/workflows/daily.yml" target="_blank" rel="noopener">\u27F3 재계산</a>'
      + '  </div>'
      + '  <div style="font-size:11px;color:#5f6368;text-align:center;margin-top:6px">최신 시세로 재계산하려면 \u27F3 재계산 \u2192 GitHub에서 "Run workflow"</div>'
      + '</div>'

      + '<div class="card">'
      + '  <div class="card-label">최신 가격</div>'
      + '  <div class="px-grid">'
      + '    <div class="px-item"><div class="px-ticker">SOXL</div><div class="px-value">$' + prices.SOXL.toFixed(2) + '</div></div>'
      + '    <div class="px-item"><div class="px-ticker">SOXX</div><div class="px-value">$' + prices.SOXX.toFixed(2) + '</div></div>'
      + '    <div class="px-item"><div class="px-ticker">QLD</div><div class="px-value">$' + prices.QLD.toFixed(2) + '</div></div>'
      + '  </div>'
      + '</div>'

      + '<div class="card">'
      + '  <div class="card-label">목표 배분</div>'
      + '  <div class="target-row">'
      + '    <div class="target-card">'
      + '      <div class="target-pct">' + target.core_pct + '%</div>'
      + '      <div class="target-ticker">' + target.core_ticker + '</div>'
      + (s === "OFF" ? '<div class="target-note">\u2192 현금</div>' : "")
      + '    </div>'
      + '    <div class="target-card">'
      + '      <div class="target-pct">' + target.satellite_pct + '%</div>'
      + '      <div class="target-ticker">' + target.satellite_ticker + '</div>'
      + '    </div>'
      + '  </div>'
      + '</div>'

      + '<div class="card">'
      + '  <div class="card-label">핵심 결론</div>'
      + '  <div class="conclusion">' + conclusion + '</div>'
      + '  <div style="margin-top:8px;font-size:12px"><a href="https://github.com/wilocraw-alt/qld-timing-backtest/blob/main/RESEARCH.md" target="_blank">\uD83D\uDCC4 전체 연구 보기 \u2192</a></div>'
      + '</div>'

      + '<div class="meta-line">'
      + '  <span><span class="status-dot ' + (market.open ? "open" : "closed") + '"></span>' + (market.open ? "NYSE 개장" : "NYSE 휴장") + '</span>'
      + '  <span>기준일 ' + d.ref_close + '</span>'
      + '  <span>갱신 ' + timeStr + '</span>'
      + '</div>'

      + '<div class="footer">'
      + '  ' + d.disclaimer + '<br><br>'
      + '  <a href="https://github.com/wilocraw-alt/qld-timing-backtest" target="_blank">GitHub</a>'
      + '</div>';

    if (cachedSeries) {
      var canvas = document.getElementById("chart");
      if (canvas) drawChart(canvas, cachedSeries);
    }
  }

  window.__refresh = function() {
    loadData().then(function() { loadSeries(); });
  };

  loadData().then(function() { loadSeries(); });
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function (e) { console.warn("SW 등록 실패", e); });
  });
}
</script>
</body>
</html>
