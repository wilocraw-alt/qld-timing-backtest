<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1d23">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="manifest" href="./manifest.webmanifest">
<title>타이밍 wATH — 데일리 신호</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; background: #111318; color: #e0e2e6; padding: 16px; padding-bottom: 48px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
h1 { font-size: 18px; font-weight: 700; text-align: center; padding: 20px 0 8px; letter-spacing: -0.3px; color: #e8eaed; }
.subtitle { text-align: center; font-size: 12px; color: #9aa0a6; margin-bottom: 20px; }
.card { background: #1a1d23; border-radius: 14px; padding: 18px; margin-bottom: 14px; border: 1px solid #2c2f36; }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #9aa0a6; margin-bottom: 6px; }
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 18px; border-radius: 100px; font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
.badge.on { background: #0d652d; color: #c6f0d6; }
.badge.off { background: #3c4043; color: #9aa0a6; }
.badge.neutral { background: #5c3b00; color: #fde293; }
.signal-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.signal-meta { font-size: 13px; color: #9aa0a6; }
.px-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
.px-item { background: #22252b; border-radius: 10px; padding: 12px; text-align: center; }
.px-ticker { font-size: 12px; color: #9aa0a6; font-weight: 600; }
.px-value { font-size: 20px; font-weight: 700; color: #e8eaed; margin-top: 2px; }
.target-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; }
.target-card { flex: 1; background: #22252b; border-radius: 10px; padding: 14px; text-align: center; }
.target-pct { font-size: 28px; font-weight: 800; color: #e8eaed; }
.target-ticker { font-size: 13px; color: #9aa0a6; margin-top: 2px; }
.target-note { font-size: 11px; color: #f28b82; margin-top: 4px; }
.ratio-bar { display: flex; align-items: center; gap: 4px; margin-top: 8px; height: 6px; position: relative; }
.ratio-track { flex: 1; height: 6px; background: #2c2f36; border-radius: 3px; position: relative; overflow: visible; }
.ratio-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.ratio-marker { position: absolute; top: -8px; width: 2px; height: 22px; background: #e8eaed; border-radius: 1px; }
.ratio-marker.upper { background: #5f9b5f; }
.ratio-marker.lower { background: #9b5f5f; }
.ratio-label { font-size: 11px; color: #9aa0a6; }
.conclusion { font-size: 13px; color: #c4c7cc; padding: 8px 0 4px; line-height: 1.6; }
.meta-line { display: flex; justify-content: center; gap: 16px; font-size: 12px; color: #9aa0a6; margin-top: 4px; }
.footer { text-align: center; font-size: 11px; color: #5f6368; margin-top: 28px; line-height: 1.6; }
.footer a { color: #8ab4f8; text-decoration: none; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status-dot.open { background: #34a853; }
.status-dot.closed { background: #ea4335; }
.loading { text-align: center; padding: 40px 0; color: #9aa0a6; font-size: 14px; }
.period-btn { flex:1; padding:8px; border-radius:8px; font-size:13px; font-weight:600; border:1px solid #3c4043; background:transparent; color:#9aa0a6; cursor:pointer; min-height:36px; -webkit-tap-highlight-color:transparent; }
.period-btn.active { background:#303134; color:#e8eaed; border-color:#5f6368; }
.period-btn:active { background:#404348; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-primary, .btn-secondary { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; -webkit-tap-highlight-color: transparent; text-decoration: none; }
.btn-primary { background: #303134; color: #e8eaed; }
.btn-primary:active { background: #404348; }
.btn-primary:disabled { opacity: 0.5; }
.btn-secondary { background: transparent; color: #8ab4f8; border: 1px solid #3c4043; }
.btn-secondary:active { background: #1a1d23; }
.toast { font-size: 12px; color: #f28b82; text-align: center; padding: 6px 0 0; }
.check-time { font-size: 11px; color: #5f6368; text-align: center; margin-top: 4px; }
.chart-wrap { margin-top: 12px; width: 100%; }
.chart-wrap canvas { display: block; width: 100%; height: 200px; border-radius: 8px; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-input, .form-select { background: #22252b; border: 1px solid #3c4043; border-radius: 8px; padding: 10px; color: #e8eaed; font-size: 14px; min-height: 44px; outline: none; width: 100%; }
.form-input:focus, .form-select:focus { border-color: #8ab4f8; }
.form-select { appearance: auto; }
.form-btn { width: 100%; padding: 12px; background: #303134; color: #e8eaed; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; min-height: 44px; cursor: pointer; margin-bottom: 10px; }
.form-btn:active { background: #404348; }
.journal-item { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; border-left: 3px solid #5f6368; background: #22252b; }
.journal-buy { border-left-color: #34a853; }
.journal-sell { border-left-color: #ea4335; }
.journal-item .j-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.j-tag.buy { background: #0d652d; color: #c6f0d6; }
.j-tag.sell { background: #5c1a1a; color: #f2c4c4; }
.j-item-main { flex: 1; line-height: 1.4; }
.j-item-date { color: #9aa0a6; font-size: 11px; }
.j-item-pl { font-weight: 600; font-size: 13px; }
.j-item-pl.pos { color: #34a853; }
.j-item-pl.neg { color: #ea4335; }
.j-item-pl.z { color: #9aa0a6; }
.j-del { background: none; border: none; color: #5f6368; font-size: 18px; cursor: pointer; padding: 4px 8px; min-height: 44px; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 6px; margin-bottom: 10px; }
.summary-cell { background: #22252b; border-radius: 8px; padding: 8px; text-align: center; }
.summary-cell .s-val { font-size: 16px; font-weight: 700; }
.summary-cell .s-label { font-size: 10px; color: #9aa0a6; }
.empty-list { text-align: center; color: #5f6368; font-size: 12px; padding: 16px 0; }
.sm-btn { display:block;width:100%;padding:10px;background:#22252b;color:#9aa0a6;border:1px solid #3c4043;border-radius:8px;font-size:13px;cursor:pointer;min-height:44px;margin-top:6px;text-align:center; }
.sm-btn:active { background:#303134; }
.warn-badge { display:inline-block;background:#5c1a1a;color:#f2c4c4;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px; }
.alloc-note { font-size:11px;color:#9aa0a6;text-align:center;margin-top:6px;padding:6px;background:#22252b;border-radius:8px; }
</style>
</head>
<body>
<h1>타이밍 wATH</h1>
<div class="subtitle">SOXL60 + QLD40 — 데일리 추세 신호</div>
<div id="dataInfo" class="meta-line" style="justify-content:center;margin-bottom:16px;display:none"></div>

<div id="app" class="loading">데이터 불러오는 중...</div>
<div id="toast" class="toast" style="display:none"></div>
<div id="checkTime" class="check-time" style="display:none"></div>

<script>
(function() {
  const app = document.getElementById("app");
  const toast = document.getElementById("toast");
  const checkTime = document.getElementById("checkTime");
  let cachedData = null;
  let cachedSeries = null;
  const LS_KEY = "wath_journal_v1";

  function getJournal() { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); }
  function saveJournal(j) { localStorage.setItem(LS_KEY, JSON.stringify(j)); }

  window.__computeRebalance = function(journal, prices, signalState, additionalCash) {
    var addCash = parseFloat(additionalCash) || 0;
    var soxlHeld = 0, qldHeld = 0;
    var soxlBuyCost = 0, soxlBuyQty = 0;
    var qldBuyCost = 0, qldBuyQty = 0;
    var warnings = [];
    var missingQtySOXL = false, missingQtyQLD = false;

    for (var i = 0; i < journal.length; i++) {
      var e = journal[i];
      var qty = e.qty || 0;
      if (e.qty === undefined || e.qty === null) {
        if (e.ticker === "SOXL") missingQtySOXL = true;
        else if (e.ticker === "QLD") missingQtyQLD = true;
      }
      if (e.ticker === "SOXL") {
        if (e.type === "buy") { soxlHeld += qty; soxlBuyCost += e.price * qty; soxlBuyQty += qty; }
        else { soxlHeld -= qty; }
      } else if (e.ticker === "QLD") {
        if (e.type === "buy") { qldHeld += qty; qldBuyCost += e.price * qty; qldBuyQty += qty; }
        else { qldHeld -= qty; }
      }
    }
    if (soxlHeld < 0) { warnings.push("SOXL 보유수량 음수→0 처리"); soxlHeld = 0; }
    if (qldHeld < 0) { warnings.push("QLD 보유수량 음수→0 처리"); qldHeld = 0; }
    if (missingQtySOXL) warnings.push("SOXL: 수량 미입력 항목 있음 — 정확도 저하");
    if (missingQtyQLD) warnings.push("QLD: 수량 미입력 항목 있음 — 정확도 저하");

    var soxlPrice = prices && prices.SOXL ? prices.SOXL : 0;
    var qldPrice = prices && prices.QLD ? prices.QLD : 0;
    var soxlVal = soxlHeld * soxlPrice;
    var qldVal = qldHeld * qldPrice;
    var base = soxlVal + qldVal;
    var pool = base + addCash;

    if (!soxlPrice && soxlHeld > 0) warnings.push("SOXL 시세 없음");
    if (!qldPrice && qldHeld > 0) warnings.push("QLD 시세 없음");

    var soxlPct = 0, qldPct = 0;
    if (base > 0) { soxlPct = soxlVal / base; qldPct = qldVal / base; }

    var effectiveState = signalState;
    var targetSOXL, targetQLD, cashTarget;
    if (signalState === "ON") {
      effectiveState = "ON";
      targetSOXL = 0.6; targetQLD = 0.4; cashTarget = 0;
    } else if (signalState === "OFF") {
      effectiveState = "OFF";
      targetSOXL = 0; targetQLD = 0.4; cashTarget = 0.6;
    } else {
      if (soxlVal > 1) {
        effectiveState = "NEUTRAL_HELD";
        targetSOXL = 0.6; targetQLD = 0.4; cashTarget = 0;
      } else {
        effectiveState = "NEUTRAL_FLAT";
        targetSOXL = 0; targetQLD = 0.4; cashTarget = 0.6;
      }
    }

    function dustAction(ticker, targetPct, currentVal, currentHeld, price) {
      if (pool === 0 || !price) return { side: "hold", usd: 0, shares: 0 };
      var targetVal = pool * targetPct;
      var delta = targetVal - currentVal;
      if (Math.abs(delta) < 1 && currentHeld > 0) return { side: "hold", usd: 0, shares: 0 };
      var shares = Math.abs(delta) / price;
      if (shares < 0.001) return { side: "hold", usd: 0, shares: 0 };
      var side = delta > 0 ? "buy" : "sell";
      return { side: side, usd: Math.abs(delta), shares: shares };
    }
    var soxlAction = dustAction("SOXL", targetSOXL, soxlVal, soxlHeld, soxlPrice);
    var qldAction = dustAction("QLD", targetQLD, qldVal, qldHeld, qldPrice);

    var note = "";
    if (signalState === "ON") note = "신호 ON — SOXL 60% / QLD 40% 목표";
    else if (signalState === "OFF") note = "신호 OFF — SOXL 전량 매도 → 현금 60%";
    else if (effectiveState === "NEUTRAL_HELD") note = "신호 NEUTRAL — SOXL 보유중 → 60/40 유지";
    else note = "신호 NEUTRAL — SOXL 미보유 → 현금 유지";

    return {
      base: base,
      pool: pool,
      holdings: { SOXL: soxlHeld, QLD: qldHeld },
      value: { SOXL: soxlVal, QLD: qldVal },
      currentPct: { SOXL: soxlPct, QLD: qldPct },
      targetPct: { SOXL: targetSOXL, QLD: targetQLD },
      cashTargetPct: cashTarget,
      effectiveState: effectiveState,
      actions: { SOXL: soxlAction, QLD: qldAction },
      warnings: warnings,
      note: note
    };
  };

  async function loadData() {
    try {
      const res = await fetch("./data/latest.json?_=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const d = await res.json();
      
      // Save the additional cash input value before re-rendering
      var addCashInput = document.getElementById("addCashInput");
      var savedAddCash = addCashInput ? addCashInput.value : "";
      
      cachedData = d;
      render(d);
      
      // Restore the input value after rendering
      if (savedAddCash !== "") {
        var newAddCashInput = document.getElementById("addCashInput");
        if (newAddCashInput) newAddCashInput.value = savedAddCash;
      }
      
      renderJournal();
      renderRebalance();
      
      const now = new Date();
      checkTime.textContent = "마지막 확인: " + now.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      checkTime.style.display = "block";
      toast.style.display = "none";
      return d;
    } catch(e) {
      console.error("loadData error:", e && e.message ? e.message : e);
      if (cachedData) {
        toast.textContent = "⚠️ 오프라인 — 캐시된 데이터 표시 중";
        toast.style.display = "block";
        return cachedData;
      }
      app.innerHTML = '<div class="card" style="text-align:center;padding:32px;color:#f28b82;">⚠️ 데이터를 불러올 수 없습니다<br><span style="font-size:12px;color:#9aa0a6">' + e.message + '</span></div>';
    }
  }

  async function loadSeries() {
    try {
      const res = await fetch("./data/series.json?_=" + Date.now(), { cache: "no-store" });
      if (!res.ok) return;
      const s = await res.json();
      cachedSeries = s;
      var canvas = document.getElementById("chart");
      if (canvas) drawChart(canvas, s);
    } catch(_) {}
  }

  window.__addEntry = function() {
    var date = new Date().toISOString().slice(0, 10);
    var type = "buy";
    var ticker = document.getElementById("jTicker").value.trim().toUpperCase();
    var price = parseFloat(document.getElementById("jPrice").value);
    var qty = parseFloat(document.getElementById("jQty").value) || 0;
    var memo = document.getElementById("jMemo").value.trim();
    if (!ticker || isNaN(price) || price <= 0 || isNaN(qty) || qty < 0) { alert("티커·평단가·수량(0 이상)을 올바르게 입력해주세요."); return; }
    var j = getJournal();
    
    var foundIndex = -1;
    for (var idx = 0; idx < j.length; idx++) {
      if (j[idx].ticker === ticker) {
        foundIndex = idx;
        break;
      }
    }
    
    var entry = {
      id: foundIndex >= 0 ? j[foundIndex].id : Date.now(),
      date: date,
      type: type,
      ticker: ticker,
      price: price,
      qty: qty,
      memo: memo
    };
    
    if (foundIndex >= 0) {
      j[foundIndex] = entry;
    } else {
      j.push(entry);
    }
    
    saveJournal(j);
    renderJournal();
    renderRebalance();
    // redraw chart markers
    var canvas = document.getElementById("chart");
    if (canvas && cachedSeries) drawChart(canvas, cachedSeries);
  };

  window.__deleteEntry = function(id) {
    if (!confirm("이 보유 기록을 삭제하시겠습니까?")) return;
    var j = getJournal().filter(function(e) { return e.id !== id; });
    saveJournal(j);
    renderJournal();
    renderRebalance();
    var canvas = document.getElementById("chart");
    if (canvas && cachedSeries) drawChart(canvas, cachedSeries);
  };

  window.__journalShowAll = false;
  window.__toggleJournalList = function() {
    window.__journalShowAll = !window.__journalShowAll;
    renderJournal();
  };

  window.__toggleJournalForm = function() {
    var form = document.getElementById("journalForm");
    var btn = document.getElementById("journalToggleBtn");
    if (!form || !btn) return;
    var shown = form.style.display !== "none";
    form.style.display = shown ? "none" : "block";
    btn.textContent = shown ? "+ 보유 현황 입력" : "− 접기";
  };

  function renderRebalance() {
    var resultDiv = document.getElementById("rebalanceResult");
    if (!resultDiv) return;

    var j = getJournal();
    var prices = (cachedData && cachedData.prices) || {};
    var signalState = (cachedData && cachedData.signal && cachedData.signal.state) || "NEUTRAL";
    var target = (cachedData && cachedData.target) || { core_ticker: "SOXL", satellite_ticker: "QLD", core_pct: 60, satellite_pct: 40 };

    var addCashInput = document.getElementById("addCashInput");
    var addCash = addCashInput ? parseFloat(addCashInput.value) || 0 : 0;

    var rb = window.__computeRebalance(j, prices, signalState, addCash);

    var whtml = "";

    if (!rb || (rb.base === 0 && addCash === 0)) {
      var cp = target.core_pct, sp = target.satellite_pct;
      var ct = target.core_ticker, st = target.satellite_ticker;
      whtml += '<div class="target-row">'
        + '  <div class="target-card">'
        + '    <div class="target-pct">' + cp + '%</div>'
        + '    <div class="target-ticker">' + ct + '</div>'
        + (signalState === "OFF" ? '<div class="target-note">\u2192 현금</div>' : "")
        + '  </div>'
        + '  <div class="target-card">'
        + '    <div class="target-pct">' + sp + '%</div>'
        + '    <div class="target-ticker">' + st + '</div>'
        + '  </div>'
        + '</div>'
        + '<div class="alloc-note">보유 없음 — 보유 자산 또는 추가 투자 금액을 입력하세요</div>';
    } else {
      function fmtShares(n) {
        if (!isFinite(n)) return "0";
        var r = Math.round(n * 10000) / 10000;
        return (parseFloat(r.toFixed(4))).toString();
      }
      function actStr(a) {
        if (a.side === "hold") return "유지";
        var label = a.side === "buy" ? "매수" : "매도";
        return label + " $" + a.usd.toFixed(0) + " / " + fmtShares(a.shares) + "주";
      }
      function pctStr(v) { return (v * 100).toFixed(0) + "%"; }
      whtml += '<div class="alloc-note">' + rb.note + '</div>'
        + '<div class="target-row">'
        + '  <div class="target-card">'
        + '    <div class="target-pct" style="font-size:22px">' + pctStr(rb.targetPct.SOXL) + '</div>'
        + '    <div class="target-ticker">' + target.core_ticker + ' 목표</div>'
        + '    <div style="font-size:15px;font-weight:700;color:' + (rb.currentPct.SOXL > rb.targetPct.SOXL ? "#ea4335" : "#34a853") + ';margin-top:4px">'
        +       pctStr(rb.currentPct.SOXL) + ' 현재</div>'
        + '    <div style="font-size:13px;color:#e8eaed;margin-top:4px;font-weight:bold;">' + actStr(rb.actions.SOXL) + '</div>'
        + (rb.holdings.SOXL > 0 ? '<div style="font-size:11px;color:#9aa0a6">' + fmtShares(rb.holdings.SOXL) + '주 / $' + rb.value.SOXL.toFixed(0) + '</div>' : '')
        + '  </div>'
        + '  <div class="target-card">'
        + '    <div class="target-pct" style="font-size:22px">' + pctStr(rb.targetPct.QLD) + '</div>'
        + '    <div class="target-ticker">' + target.satellite_ticker + ' 목표</div>'
        + '    <div style="font-size:15px;font-weight:700;color:' + (rb.currentPct.QLD > rb.targetPct.QLD ? "#ea4335" : "#34a853") + ';margin-top:4px">'
        +       pctStr(rb.currentPct.QLD) + ' 현재</div>'
        + '    <div style="font-size:13px;color:#e8eaed;margin-top:4px;font-weight:bold;">' + actStr(rb.actions.QLD) + '</div>'
        + (rb.holdings.QLD > 0 ? '<div style="font-size:11px;color:#9aa0a6">' + fmtShares(rb.holdings.QLD) + '주 / $' + rb.value.QLD.toFixed(0) + '</div>' : '')
        + '  </div>'
        + '</div>';
      if (rb.cashTargetPct > 0) {
        whtml += '<div style="text-align:center;font-size:13px;color:#9aa0a6;margin-top:6px">\uD83D\uDCB0 현금 목표: ' + pctStr(rb.cashTargetPct) + '</div>';
      }
      if (rb.warnings.length > 0) {
        whtml += '<div style="margin-top:6px">';
        for (var wi = 0; wi < rb.warnings.length; wi++) {
          whtml += '<div style="font-size:11px;color:#f28b82;padding:2px 0">\u26A0\uFE0F ' + rb.warnings[wi] + '</div>';
        }
        whtml += '</div>';
      }
    }

    resultDiv.innerHTML = whtml;
  }

  window.__updateAddCash = function() {
    renderRebalance();
  };

  function renderJournal() {
    var j = getJournal();
    var summ = document.getElementById("journalSummary");
    var list = document.getElementById("journalList");
    if (!list) return;
    var prices = (cachedData && cachedData.prices) || {};

    // holdings per ticker
    var holdQty = {}, buyCost = {}, buyQty = {};
    j.forEach(function(e) {
      if (!holdQty[e.ticker]) { holdQty[e.ticker] = 0; buyCost[e.ticker] = 0; buyQty[e.ticker] = 0; }
      var qty = e.qty || 0;
      if (e.type === "buy") { holdQty[e.ticker] += qty; buyCost[e.ticker] += e.price * qty; buyQty[e.ticker] += qty; }
      else { holdQty[e.ticker] -= qty; }
    });
    var tickers = Object.keys(holdQty);
    var shtml = "";
    if (tickers.length > 0) {
      shtml = '<div class="summary-grid">';
      tickers.forEach(function(t) {
        var h = holdQty[t] || 0;
        var cur = prices[t];
        var avgCost = buyQty[t] > 0 ? buyCost[t] / buyQty[t] : 0;
        var curVal = cur ? cur * h : 0;
        var costBasis = avgCost * h;
        var plVal = curVal - costBasis;
        var plPct = costBasis > 0 ? (plVal / costBasis * 100) : null;
        var plCls = plPct !== null ? (plPct > 0.5 ? "pos" : plPct < -0.5 ? "neg" : "z") : "z";
        var plColor = plCls === "pos" ? "#34a853" : plCls === "neg" ? "#ea4335" : "#9aa0a6";
        shtml += '<div class="summary-cell">'
          + '<div class="s-val" style="color:' + plColor + '">'
          + (plPct !== null ? (plPct > 0 ? "+" : "") + plPct.toFixed(1) + "%" : "?")
          + '</div>'
          + '<div class="s-label">' + t + '</div>'
          + '<div style="font-size:11px;color:#9aa0a6">' + h.toFixed(h % 1 === 0 ? 0 : 3) + '주 @$' + avgCost.toFixed(2) + '</div>'
          + (cur ? '<div style="font-size:11px;color:#9aa0a6">$' + cur.toFixed(2) + ' → $' + curVal.toFixed(0) + '</div>' : '')
          + '</div>';
      });
      shtml += '</div>';
    } else {
      shtml = '<div class="empty-list">거래를 추가해 주세요</div>';
    }
    summ.innerHTML = shtml;

    // list — max 20 with toggle
    var showAll = window.__journalShowAll;
    var maxItems = 20;

        var e = j[i];
        var cur = prices[e.ticker];
        var plStr = "", plCls = "z";
        if (cur) {
          var plPct = (cur - e.price) / e.price * 100;
          var plAmt = e.qty ? (cur - e.price) * e.qty : 0;
          plCls = plPct > 0.5 ? "pos" : plPct < -0.5 ? "neg" : "z";
          plStr = (e.type === "buy" ? "" : "(실현) ") + (plPct > 0 ? "+" : "") + plPct.toFixed(1) + "%"
            + (e.qty ? " ($" + (plAmt > 0 ? "+" : "") + plAmt.toFixed(0) + ")" : "");
        } else {
          plStr = "현재가 없음";
        }
        var tagCls = e.type === "buy" ? "buy" : "sell";
        var tagLabel = e.type === "buy" ? "매수" : "매도";
        var dateLabel = e.date.slice(2);
        var mainLabel = "@$" + e.price.toFixed(2);
        if (e.qty) mainLabel += " \u00D7" + e.qty;
        if (e.memo) mainLabel += " " + e.memo;
        lhtml += '<div class="journal-item journal-' + e.type + '">'
          + '<span class="j-tag ' + tagCls + '">' + tagLabel + '</span>'
          + '<div class="j-item-main"><div class="j-item-date">' + dateLabel + ' ' + e.ticker + ' ' + mainLabel + '</div>'
          + '<span class="j-item-pl ' + plCls + '">' + plStr + '</span></div>'
          + '<button class="j-del" onclick="window.__deleteEntry(' + e.id + ')">\u2716</button>'
          + '</div>';
      }
      var hidden = total - maxItems;
      if (hidden > 0) {
        lhtml += '<button class="sm-btn" onclick="window.__toggleJournalList()">'
          + (showAll ? '\u25B2 접기' : '\u25BC 더 보기 (+' + hidden + ')')
          + '</button>';
      }
      list.innerHTML = lhtml;
    }
  }

  function drawChart(canvas, series) {
    var pts = series.points;
    if (!pts || pts.length < 2) return;
    var periodDays = window.__chartPeriod || 90;
    if (periodDays > 0) {
      var cutoff = Date.now() - periodDays * 86400000;
      var filtered = pts.filter(function(p) { return new Date(p.d + "T00:00:00").getTime() >= cutoff; });
      if (filtered.length >= 2) pts = filtered;
    }
    const buf = series.buffer || 0.03;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width;
    const h = 200;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    const pad = { top: 14, right: 10, bottom: 28, left: 48 };
    const pw = w - pad.left - pad.right;
    const ph = h - pad.top - pad.bottom;

    const hasMA = pts.some(function(p) { return p.ma !== null; });

    var yMin = Infinity, yMax = -Infinity;
    for (var i = 0; i < pts.length; i++) {
      var v = pts[i].soxx;
      if (v < yMin) yMin = v;
      if (v > yMax) yMax = v;
      if (hasMA && pts[i].ma !== null) {
        var mv = pts[i].ma;
        if (mv < yMin) yMin = mv;
        if (mv > yMax) yMax = mv;
      }
    }
    if (hasMA) {
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var uv = pts[i].ma * (1 + buf);
        var lv = pts[i].ma * (1 - buf);
        if (uv > yMax) yMax = uv;
        if (lv < yMin) yMin = lv;
      }
    }
    var range = yMax - yMin || 1;
    var margin = range * 0.05;
    yMin -= margin;
    yMax += margin;

    function yPos(v) { return pad.top + ph - (v - yMin) / (yMax - yMin) * ph; }
    function xPos(i) { return pad.left + i / (pts.length - 1) * pw; }

    ctx.clearRect(0, 0, w, h);

    // band fill
    if (hasMA) {
      ctx.beginPath();
      var started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i);
        if (!started) { ctx.moveTo(x, yPos(pts[i].ma * (1 + buf))); started = true; }
        else ctx.lineTo(x, yPos(pts[i].ma * (1 + buf)));
      }
      for (var i = pts.length - 1; i >= 0; i--) {
        if (pts[i].ma === null) continue;
        ctx.lineTo(xPos(i), yPos(pts[i].ma * (1 - buf)));
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(249,171,0,0.10)";
      ctx.fill();

      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1;
      ctx.beginPath();
      started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i), y = yPos(pts[i].ma * (1 + buf));
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(249,171,0,0.35)";
      ctx.stroke();
      ctx.beginPath();
      started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i), y = yPos(pts[i].ma * (1 - buf));
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(249,171,0,0.35)";
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // MA line
    if (hasMA) {
      ctx.beginPath();
      started = false;
      for (var i = 0; i < pts.length; i++) {
        if (pts[i].ma === null) continue;
        var x = xPos(i), y = yPos(pts[i].ma);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "#f9ab00";
      ctx.stroke();
    }

    // SOXX line
    ctx.beginPath();
    for (var i = 0; i < pts.length; i++) {
      var x = xPos(i), y = yPos(pts[i].soxx);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#8ab4f8";
    ctx.stroke();

    // last point highlight
    var last = pts[pts.length - 1];
    var lx = xPos(pts.length - 1), ly = yPos(last.soxx);
    ctx.beginPath();
    ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#8ab4f8";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(lx, ly, 2, 0, Math.PI * 2);
    ctx.fillStyle = "#111318";
    ctx.fill();
    if (hasMA && last.ma !== null) {
      var lmy = yPos(last.ma);
      ctx.beginPath();
      ctx.arc(lx, lmy, 3, 0, Math.PI * 2);
      ctx.fillStyle = "#f9ab00";
      ctx.fill();
    }

    // trade markers from localStorage
    var entries = getJournal();
    if (entries.length > 0 && pts.length > 0) {
      var startDate = pts[0].d, endDate = last.d;
      entries.forEach(function(e) {
        if (e.date < startDate || e.date > endDate) return;
        // find closest point
        var idx = -1;
        for (var i = 0; i < pts.length; i++) {
          if (pts[i].d >= e.date) { idx = i; break; }
        }
        if (idx < 0 || idx >= pts.length) return;
        var mx = xPos(idx), my = yPos(pts[idx].soxx);
        ctx.beginPath();
        if (e.type === "buy") {
          ctx.moveTo(mx, my - 8);
          ctx.lineTo(mx - 5, my);
          ctx.lineTo(mx + 5, my);
          ctx.closePath();
          ctx.fillStyle = "#34a853";
        } else {
          ctx.moveTo(mx, my + 8);
          ctx.lineTo(mx - 5, my);
          ctx.lineTo(mx + 5, my);
          ctx.closePath();
          ctx.fillStyle = "#ea4335";
        }
        ctx.fill();
        ctx.font = "9px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = e.type === "buy" ? "bottom" : "top";
        ctx.fillStyle = "#e8eaed";
        ctx.fillText(e.date.slice(5) + " " + e.ticker + " @$" + e.price.toFixed(1), mx, e.type === "buy" ? my - 10 : my + 10);
      });
    }

    // Y axis
    var yTicks = 4;
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.font = "10px sans-serif";
    ctx.fillStyle = "#5f6368";
    for (var i = 0; i <= yTicks; i++) {
      var v = yMin + (yMax - yMin) * i / yTicks;
      var y = yPos(v);
      ctx.fillText("$" + v.toFixed(0), pad.left - 6, y);
      ctx.beginPath();
      ctx.moveTo(pad.left - 4, y);
      ctx.lineTo(pad.left, y);
      ctx.strokeStyle = "#2c2f36";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // X axis
    var xLabels = 4;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    for (var i = 0; i < xLabels; i++) {
      var idx = Math.floor(i * (pts.length - 1) / (xLabels - 1));
      ctx.fillText(pts[idx].d.slice(2), pad.left + idx / (pts.length - 1) * pw, pad.top + ph + 6);
    }

    // legend
    ctx.textBaseline = "top";
    ctx.font = "10px sans-serif";
    var legX = pad.left + 6, legY = pad.top + 4;
    var legendItems = [
      { label: "SOXX", color: "#8ab4f8" },
      { label: "120MA", color: "#f9ab00" },
      { label: "\u00B1" + (buf * 100).toFixed(0) + "%", color: "rgba(249,171,0,0.35)" },
    ];
    if (entries.length > 0) {
      legendItems.push({ label: "\u25B2\u25BC\u00B7", color: "#e8eaed" });
    }
    for (var i = 0; i < legendItems.length; i++) {
      ctx.fillStyle = legendItems[i].color;
      ctx.fillRect(legX, legY + 1, 10, 2);
      ctx.fillStyle = "#9aa0a6";
      ctx.fillText(legendItems[i].label, legX + 14, legY - 1);
      legX += ctx.measureText(legendItems[i].label).width + 28;
    }

    // ratio label
    if (hasMA && last.ma !== null) {
      ctx.textAlign = "left";
      ctx.textBaseline = "bottom";
      ctx.font = "bold 11px sans-serif";
      ctx.fillStyle = "#e8eaed";
      ctx.fillText((last.soxx / last.ma).toFixed(3) + "x", lx + 7, ly - 2);
    }
  }

  window.__exportJournal = function() {
    var data = localStorage.getItem(LS_KEY) || "[]";
    var blob = new Blob([data], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var now = new Date();
    var ds = now.getFullYear() + ("0" + (now.getMonth()+1)).slice(-2) + ("0" + now.getDate()).slice(-2);
    a.download = "wath_journal_" + ds + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  window.__handleImport = function(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error("배열 형식이 아닙니다");
        data.forEach(function(entry, i) {
          if (!entry.id || !entry.date || !entry.type || !entry.ticker || !entry.price) {
            throw new Error(i + "번 항목에 필수 필드(id, date, type, ticker, price) 누락");
          }
        });
        if (!confirm("거래 기록을 가져옵니다. 현재 데이터를 덮어씁니다. 계속하시겠습니까?")) return;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
        renderJournal();
        renderRebalance();
        var canvas = document.getElementById("chart");
        if (canvas && cachedSeries) drawChart(canvas, cachedSeries);
        toast.textContent = "✅ 가져오기 완료 (" + data.length + "개 항목)";
        toast.style.display = "block";
      } catch(err) {
        alert("❌ 잘못된 파일입니다: " + err.message);
      }
    };
    reader.readAsText(file);
    event.target.value = "";
  };

  window.__refresh = function() {
    loadData().then(function() { loadSeries(); });
  };

  loadData().then(function() { loadSeries(); });
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function (e) { console.warn("SW 등록 실패", e); });
  });
}
</script>
</body>
</html>
